set_mode:
  name: Définir le mode
  description: Définit le mode de fonctionnement du RMS VE.
  fields:
    entry_id:
      name: Entry ID
      description: Identifiant de l'entrée de configuration RMS VE.
      example: abc123def456
      selector:
        text:
    device_id:
      name: Équipement
      description: Équipement RMS VE cible.
      selector:
        device:
          integration: ve_router
    mode:
      name: Mode
      description: Valeur numérique ou libellé du mode.
      required: true
      example: Auto
      selector:
        select:
          options:
            - "0"
            - "1"
            - "2"
            - "3"
            - Auto
            - Semi-auto
            - Manuel
            - Arrêt
set_current:
  name: Définir le courant manuel
  description: Définit le courant de charge manuel du RMS VE.
  fields:
    entry_id:
      name: Entry ID
      description: Identifiant de l'entrée de configuration RMS VE.
      example: abc123def456
      selector:
        text:
    device_id:
      name: Équipement
      description: Équipement RMS VE cible.
      selector:
        device:
          integration: ve_router
    current:
      name: Courant
      description: Courant manuel en ampères.
      required: true
      example: 16
      selector:
        number:
          min: 1
          max: 80
          step: 1
          unit_of_measurement: A
